name: Build StreamFlow Player APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Build APK
        run: gradle assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,O=Android,C=US" 2>/dev/null
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore debug.keystore -storepass android -keypass android \
            app/build/outputs/apk/release/*.apk debug 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamFlowPlayer-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
