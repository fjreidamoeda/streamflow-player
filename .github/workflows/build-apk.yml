name: Build StreamFlow Player APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          SDKMAN=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          if [ ! -f "$SDKMAN" ]; then SDKMAN=$ANDROID_HOME/tools/bin/sdkmanager; fi
          if [ ! -f "$SDKMAN" ]; then SDKMAN=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager; fi
          echo "Using sdkmanager: $SDKMAN"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | "$SDKMAN" "platforms;android-34" 2>&1 | tail -5

      - name: Verify setup
        run: |
          echo "=== Java ===" && java -version
          echo "=== SDK ===" && ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          echo "=== Project files ===" && ls -la

      - name: Download Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build
        run: gradle assembleRelease --no-daemon 2>&1

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
