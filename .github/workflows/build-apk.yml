name: Build StreamFlow Player APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nome do aplicativo'
        required: true
        default: 'StreamFlow'
      package_name:
        description: 'Nome do pacote (ex: com.streamflow.player)'
        required: true
        default: 'com.streamflow.player'
      panel_url:
        description: 'URL do painel'
        required: false
        default: ''
      games_url:
        description: 'URL dos jogos'
        required: false
        default: ''
      intro_video_url:
        description: 'URL do video de intro'
        required: false
        default: ''
      custom_panel_url:
        description: 'URL personalizada do painel'
        required: false
        default: ''
      logo_url:
        description: 'URL da logo para icone do app'
        required: false
        default: ''
      background_url:
        description: 'URL do background'
        required: false
        default: ''
      setup_token:
        description: 'Token de configuracao (opcional)'
        required: false
        default: ''
      token_suffix:
        description: 'Sufixo hex do token (2 chars, ex: 4a)'
        required: false
        default: ''
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          SDKMAN=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          [ ! -f "$SDKMAN" ] && SDKMAN=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          [ ! -f "$SDKMAN" ] && SDKMAN=$ANDROID_HOME/tools/bin/sdkmanager
          yes | "$SDKMAN" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Download Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v -keystore streamflow.keystore \
            -alias streamflow -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass streamflow123 -keypass streamflow123 \
            -dname "CN=StreamFlow, OU=Development, O=StreamFlow, L=Sao Paulo, ST=SP, C=BR"

      - name: Patch app package name
        if: inputs.package_name != '' && inputs.package_name != 'com.streamflow.player'
        run: |
          PACKAGE_DIR=$(echo "${{ inputs.package_name }}" | tr '.' '/')
          find app/src -type f -name "*.kt" -exec sed -i "s/^package com\.streamflow\.player$/package ${{ inputs.package_name }}/g" {} +
          find app/src -type f -name "*.xml" -exec sed -i "s/com\.streamflow\.player/${{ inputs.package_name }}/g" {} +
          mkdir -p "app/src/main/java/$PACKAGE_DIR"
          rsync -a app/src/main/java/com/streamflow/player/ "app/src/main/java/$PACKAGE_DIR/"
          rm -rf app/src/main/java/com
          # Patch applicationId and namespace in build.gradle.kts
          sed -i "s/applicationId = \"com\.streamflow\.player\"/applicationId = \"${{ inputs.package_name }}\"/" app/build.gradle.kts
          sed -i "s/namespace = \"com\.streamflow\.player\"/namespace = \"${{ inputs.package_name }}\"/" app/build.gradle.kts

      - name: Patch app name and URLs
        run: |
          APP_NAME="${{ inputs.app_name || 'StreamFlow' }}"
          PANEL_URL="${{ inputs.panel_url || vars.PANEL_URL || '' }}"
          GAMES_URL="${{ inputs.games_url || vars.GAMES_URL || '' }}"
          INTRO_VIDEO_URL="${{ inputs.intro_video_url || vars.INTRO_VIDEO_URL || '' }}"
          CUSTOM_PANEL_URL="${{ inputs.custom_panel_url || vars.CUSTOM_PANEL_URL || '' }}"

          # Patch app_name in ConfigManager and strings.xml
          if [ -n "$APP_NAME" ] && [ "$APP_NAME" != "StreamFlow" ]; then
            find app/src -name "ConfigManager.kt" -exec sed -i "s/\"StreamFlow\"/\"$APP_NAME\"/g" {} +
            sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">$APP_NAME</string>|" app/src/main/res/values/strings.xml
          fi

          # Create BuildConfig-style defaults
          if [ -n "$PANEL_URL" ] && [ "$PANEL_URL" != "https://streamflow.totalmente.online" ]; then
            find app/src -name "ConfigManager.kt" -exec sed -i "s|prefs.getString(\"panel_url\", \"https://streamflow.totalmente.online\")|prefs.getString(\"panel_url\", \"$PANEL_URL\")|g" {} +
          fi
          if [ -n "$GAMES_URL" ]; then
            find app/src -name "ConfigManager.kt" -exec sed -i "s|\${panel.trimEnd('/')}/jogos.html|$GAMES_URL|g" {} +
          fi
          if [ -n "$INTRO_VIDEO_URL" ]; then
            find app/src -name "ConfigManager.kt" -exec sed -i "s|prefs.getString(\"intro_video_url\", \"\")|prefs.getString(\"intro_video_url\", \"$INTRO_VIDEO_URL\")|g" {} +
          fi
          if [ -n "$CUSTOM_PANEL_URL" ]; then
            find app/src -name "ConfigManager.kt" -exec sed -i "s|prefs.getString(\"custom_panel_url\", \"\")|prefs.getString(\"custom_panel_url\", \"$CUSTOM_PANEL_URL\")|g" {} +
          fi
          SETUP_TOKEN="${{ inputs.setup_token || vars.SETUP_TOKEN || '' }}"
          if [ -n "$SETUP_TOKEN" ]; then
            find app/src -name "ConfigManager.kt" -exec sed -i "s|prefs.getString(\"setup_token\", \"\")|prefs.getString(\"setup_token\", \"$SETUP_TOKEN\")|g" {} +
          fi
          # Auto-compute token suffix: input > variable > push auto > default 4a
          TOKEN_SUFFIX="${{ inputs.token_suffix || vars.TOKEN_SUFFIX || '' }}"
          if [ -z "$TOKEN_SUFFIX" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              TOKEN_SUFFIX=$(printf "%02x" ${{ github.run_number }})
            else
              TOKEN_SUFFIX="4a"
            fi
          fi
          find app/src -name "ConfigManager.kt" -exec sed -i "s|prefs.getString(\"token_suffix\", \"4a\")|prefs.getString(\"token_suffix\", \"$TOKEN_SUFFIX\")|g" {} +

      - name: Download and patch logo/background
        run: |
          is_image() {
            local f="$1"
            [ -f "$f" ] && [ -s "$f" ] && file -b --mime-type "$f" | grep -q "^image/"
          }

          LOGO_URL="${{ inputs.logo_url }}"
          BG_URL="${{ inputs.background_url }}"

          if [ -n "$LOGO_URL" ]; then
            curl -sL "$LOGO_URL" -o /tmp/logo_downloaded
            if is_image /tmp/logo_downloaded; then
              mkdir -p app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
              cp /tmp/logo_downloaded app/src/main/res/mipmap-hdpi/ic_launcher.png
              cp /tmp/logo_downloaded app/src/main/res/mipmap-mdpi/ic_launcher.png
              cp /tmp/logo_downloaded app/src/main/res/mipmap-xhdpi/ic_launcher.png
              cp /tmp/logo_downloaded app/src/main/res/mipmap-xxhdpi/ic_launcher.png
              cp /tmp/logo_downloaded app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
              mkdir -p app/src/main/res/mipmap-anydpi-v26
              printf '%s\n' \
                '<?xml version="1.0" encoding="utf-8"?>' \
                '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' \
                '    <background android:drawable="@mipmap/ic_launcher"/>' \
                '    <foreground android:drawable="@mipmap/ic_launcher"/>' \
                '</adaptive-icon>' \
                > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
              sed -i 's|android:icon="@drawable/ic_tv"|android:icon="@mipmap/ic_launcher"|' app/src/main/AndroidManifest.xml
              echo "Logo installed as app icon"
            else
              echo "WARNING: Logo download is not a valid image, skipping icon patch"
            fi
          fi

          if [ -n "$BG_URL" ]; then
            curl -sL "$BG_URL" -o /tmp/bg_downloaded
            if is_image /tmp/bg_downloaded; then
              cp /tmp/bg_downloaded app/src/main/res/drawable/bg_main.png
              for layout in app/src/main/res/layout/*.xml; do
                sed -i 's|android:background="@drawable/[^"]*"|android:background="@drawable/bg_main"|g' "$layout" 2>/dev/null || true
                sed -i 's|android:background="#[A-Fa-f0-9]*"|android:background="@drawable/bg_main"|g' "$layout" 2>/dev/null || true
              done
              echo "Background installed"
            else
              echo "WARNING: Background download is not a valid image, skipping background patch"
            fi
          fi

      - name: Build
        run: |
          gradle assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_output.txt
          exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: List build outputs
        run: find app/build/outputs -name "*.apk" -ls 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: streamflow-player-apk
          path: app/build/outputs/apk/**/*.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/gradle_output.txt
